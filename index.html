<!DOCTYPE html>

    <title>Periodic Table</title><style>
body {
  --header-height: 4rem;
  display: flex;
  flex-direction: column;
  min-height: 100lvh;
  overflow: hidden;
  perspective: 1000px;
}
#scene {
  position: fixed;
  transform-style: preserve-3d;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: calc(var(--header-height) + var(--padding)) var(--padding) var(--padding);
  inset: 0;
  padding: var(--header-height) var(--padding);
}
#scene-content {
  pointer-events: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  backface-visibility: hidden;
}
#scene-content[data-layout="table"] {
  display: grid;
  grid-template-columns: repeat(18, var(--w));
  grid-auto-rows: var(--h);
  gap: 0.25rem;
  place-content: center;
}
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: row;
  flex-shrink: 1;
  position: fixed;
  z-index: 3;
  top: 0px;
  width: 100%;
  height: var(--header-height);
  padding: var(--padding);
}
.controls-group {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-direction: row;
  height: var(--header-height);
  gap: calc(var(--padding) * .5);
}
.controls button {
  background-color: var(--bg-4);
  color: var(--fg-1);
  flex-shrink: 1;
}
.controls button:hover {
  background-color: var(--bg-5);
}
.controls button.is-active {
  background-color: var(--fg-1);
  color: var(--bg-3);
}
.credits {
  text-align: center;
  position: fixed;
  z-index: 1;
  bottom: 0px;
  width: 100%;
  height: var(--header-height);
  padding: var(--padding);
  font-size: .75rem;
}
.credits a {
  color: var(--red-1);
  text-decoration: none;
}
.element {
  overflow: hidden;
  pointer-events: auto;
  --w: 3.5rem;
  --h: 4rem;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--color-3);
  background-color: var(--color-5);
  color: var(--color-1);
  width: var(--w);
  height: var(--h);
  border-radius: .25rem;
  padding: .25rem;
  transform-style: preserve-3d;
  z-index: 8;
  cursor: pointer;
}
button.element:focus-visible,
button.element:hover {
  border: 1px solid var(--color-1);
  background-color: var(--color-4);
  color: var(--color-1);
  outline: none;
}
.element.is-expanded {
  --w: 13rem;
  --h: 13rem;
  z-index: 1;
  padding: 1rem;
  align-items: flex-start;
}
.element-description {
  display: none;
  transform-style: preserve-3d;
  flex-direction: column;
  gap: .25rem;
  width: 100%;
  font-size: .625rem;
  text-transform: none;
  color: var(--color-1);
  justify-self: flex-end;
  margin-top: 1.5rem;
  text-align: left;
}
.element.is-expanded .element-description {
  display: block;
}
.element-symbol {
  transform-style: preserve-3d;
  margin-top: -.1rem;
  margin-bottom: .2rem;
  font-size: 1.5rem;
  font-weight: 700;
}
.element.is-expanded .element-symbol {
  margin-top: 0;
  margin-bottom: 0;
  font-size: 1rem;
  text-align: left;
}
.element-title {
  transform-style: preserve-3d;
  font-size: .5rem;
  font-weight: 700;
  text-align: center;
}
.element.is-expanded .element-title {
  font-size: 1.5rem;
  text-align: left;
  margin-top: 1rem;
}
.element-number {
  transform-style: preserve-3d;
  font-size: .5rem;
  text-align: right;
  align-self: flex-end;
}
.element.is-expanded .element-number {
  position: absolute;
  font-size: 1rem;
  top: 1rem;
  right: 1rem;
}
#scene-content[data-layout="sphere"] .element,
#scene-content[data-layout="helix"] .element,
#scene-content[data-layout="grid"] .element {
  position: absolute;
  left: 50%;
  top: 50%;
  margin-left: calc(var(--w) * -.5);
  margin-top: calc(var(--h) * -.5);
}
#scene-content[data-layout="table"] .element.is-expanded {
  left: -1.625rem;
  top: -1.25rem;
  margin-left: calc(var(--w) * -.25);
  margin-top: calc(var(--h) * -.25);
  margin-right: calc(var(--w) * -.5);
  margin-bottom: calc(var(--h) * -.5);
}

*, *:before, *:after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  border: 0;
  font: inherit;
  vertical-align: baseline;
}

html,
body {
  background-color: var(--bg-1);
  color: var(--fg-1);
  font-family: 'IoskeleyMono', monospace, sans-serif;
}

.br { border-radius: var(--br); }
.br .br { border-radius: calc(var(--br) * .5); }
.br .br .br { border-radius: calc(var(--br) * .25); }

.black { color: var(--bg-1); }
.white { color: var(--fg-1); }
.red { color: var(--red-1); }
.orange { color: var(--corail-1); }
.yellow { color: var(--yellow-1); }
.blue { color: var(--sky-1); }
.green { color: var(--green-1); }

.grid {
  --one-cell: 100px;
  --border-color: rgba(255,255,255,.75);
  flex-grow: 1;
  position: relative;
  width: 100%;
  height: 100%;
  padding: 0;
}

.grid:before {
  content: "";
  pointer-events: none;
  position: absolute;
  z-index: 0;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(-90deg, rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(-90deg, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:
    calc(var(--one-cell) / 10) calc(var(--one-cell) / 10),
    calc(var(--one-cell) / 10) calc(var(--one-cell) / 10),
    var(--one-cell) var(--one-cell), var(--one-cell) var(--one-cell),
    var(--one-cell) var(--one-cell), var(--one-cell) var(--one-cell);
  background-position: 0 -1px;
  backface-visibility: hidden;
}

.grid:before {
  width: calc(75px + 100%);
  left: -75px;
}

@media (min-width: 500px) {
  .grid:before {
    width: 100%;
    left: 0;
  }
}

/* Logs */

.log {
  --width: 22ch;
  --height: 20ch;
  position: fixed;
  z-index: 10;
  top: 0;
  overflow-y: scroll;
  width: var(--width);
  height: var(--height);
  padding-left: 1ch;
  padding-right: 1ch;
  padding-bottom: 1ch;
  font-family: ui-monospace, monospace;
  white-space: pre;
  background-color: rgba(0, 0, 0, .5);
}

@keyframes reveal {
  from { opacity: 1; }
  to { opacity: .4; }
}

.log span {
  animation: reveal 2s ease-in-out forwards;
}

/* Inputs */

button,
select {
  width: 100%;
  flex-shrink: .5;
  border: none;
  background-color: var(--white-1);
  border-radius: var(--input-border-radius);
  white-space: nowrap;
  margin: 0;
  height: 2rem;
}

button {
  padding: 0 .75rem;
}

select:disabled,
button:disabled {
  background-color: var(--grey);
}

select:not(:disabled):hover,
button:not(:disabled):hover {
  cursor: pointer;
  background-color: var(--white-2);
}

legend {
  display: flex;
  gap: .5rem;
  flex-direction: row;
  align-items: center;
  justify-content: flex-start;
  width: 100%;
  height: 2rem;
}

label {
  display: flex;
  gap: .5rem;
  flex-direction: row;
  align-items: center;
  justify-content: flex-start;
  height: 2rem;
}

fieldset {
  display: flex;
  flex-wrap: nowrap;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: 1px;
}

fieldset.vertical {
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
}

fieldset > * {
  border-radius: 0;
}

fieldset > *:first-child {
  border-radius: var(--input-border-radius) 0 0 var(--input-border-radius);
}

fieldset > *:last-child {
  border-radius: 0 var(--input-border-radius) var(--input-border-radius) 0;
}

.social-float a:hover{transform:translateY(-8px) scale(1.08);box-shadow:0 0 28px rgba(0,255,255,.6);border-color:#00ffff}
.social-float svg{width:28px;height:28px;fill:#9befff;transition:.35s}
.social-float a:hover svg{fill:#fff}

// Genetate the table html

const [ $sceneContent ] = utils.$('#scene-content');
const [ $template ] = utils.$('#element');

for (let i = 0, l = elements.length / ELEMENT_STRIDE; i < l; i += 1) {
  const offset = i * ELEMENT_STRIDE;
  const $el = $template.content.cloneNode(true);
  const $element = $el.querySelector('.element');
  const $number = $element.querySelector('.element-number');
  const $symbol = $element.querySelector('.element-symbol');
  const $title = $element.querySelector('.element-title');
  const $description = $element.querySelector('.element-description');
  $number.textContent = i + 1;
  $symbol.textContent = elements[offset + ELEMENT_FIELDS.SYMBOL];
  $title.textContent = elements[offset + ELEMENT_FIELDS.NAME];
  $element.dataset.color = elements[offset + ELEMENT_FIELDS.COLOR];
  $element.style.gridColumn = elements[offset + ELEMENT_FIELDS.COLUMN];
  $element.style.gridRow = elements[offset + ELEMENT_FIELDS.ROW];
  $description.innerHTML = [
    `Atomic mass: ${elements[offset + ELEMENT_FIELDS.ATOMIC_MASS]} u`,
    `Density: ${elements[offset + ELEMENT_FIELDS.DENSITY]} g/cm3`,
    `Melting: ${elements[offset + ELEMENT_FIELDS.MELTING_POINT]} &deg;C`,
    `Boiling: ${elements[offset + ELEMENT_FIELDS.BOILING_POINT]} &deg;C`,
  ].join('<br>');
  $sceneContent.appendChild($el);
}

const cards = utils.$('#scene-content .element');

// Create the cards layout and register the font-size as an extra property for animation
const elementsLayout = createLayout($sceneContent, {
  properties: ['font-size'],
  duration: 2000,
  ease: 'inOutExpo',
});

// Move the scene relative to the cursor position
const sceneAnimatable = createAnimatable('#scene', { rotateX: 200, rotateY: 200 });
window.pointer = { x: 0, y: 0, rotateX: 15, rotateY: 20, rx: 0, ry: 0 };

createTimer({
  onUpdate: () => {
    pointer.rx = utils.lerp(pointer.rx, pointer.rotateX, .01);
    pointer.ry = utils.lerp(pointer.ry, pointer.rotateY, .01);
    sceneAnimatable.rotateX(pointer.y * pointer.rx);
    sceneAnimatable.rotateY(pointer.x * pointer.ry);
  }
});

// The different layout tranform
const transformLayout = {
  table: () => {
    // The table view use CSS grid and has no special tranforms except for a selected element
    pointer.rotateX = 15;
    pointer.rotateY = 20;
    cards.forEach($el => {
      $el.style.opacity = 1;
      $el.style.transform = $el.classList.contains('is-expanded') ? 'translateZ(50px)' : 'translateZ(10px)';
    });
  },
  sphere: () => {
    const radius = 300;
    pointer.rotateX = 40;
    pointer.rotateY = 360;
    cards.forEach(($el, i) => {
      const offsetZ = $el.classList.contains('is-expanded') ? 20 : 0;
      const phi = Math.acos(-1 + (2 * i) / cards.length);
      const theta = Math.sqrt(cards.length * Math.PI) * phi;
      const sinPhi = Math.sin(phi);
      const x = radius * sinPhi * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * sinPhi * Math.sin(theta);
      const yaw = Math.atan2(x, z);
      const pitch = -Math.atan2(y, Math.hypot(x, z));
      $el.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${yaw}rad) rotateX(${pitch}rad) translateZ(${offsetZ}px)`;
    });
  },
  helix: () => {
    pointer.rotateX = 30;
    pointer.rotateY = 300;
    const radius = 400;
    const thetaStep = 0.16;
    const verticalSpacing = 3;
    const yOffset = (cards.length * verticalSpacing) / 2;
    cards.forEach(($el, i) => {
      const offsetZ = $el.classList.contains('is-expanded') ? 20 : 0;
      const theta = i * thetaStep + Math.PI;
      const y = -(i * verticalSpacing) + yOffset;
      const x = radius * Math.sin(theta);
      const z = radius * Math.cos(theta);
      const yaw = Math.atan2(x, z);
      const pitch = -Math.atan2(y, Math.hypot(x, z) * 2);
      $el.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${yaw}rad) rotateX(${pitch}rad) translateZ(${offsetZ}px)`;
    });
  },
  grid: () => {
    pointer.rotateX = 10;
    pointer.rotateY = 60;
    const cols = 5;
    const rows = 5;
    const colGap = 150;
    const rowGap = 100;
    const depthGap = 150;
    const perLayer = cols * rows;
    const layers = Math.ceil(cards.length / perLayer);
    cards.forEach(($el, i) => {
      const offsetZ = $el.classList.contains('is-expanded') ? 20 : 0;
      const col = i % cols;
      const row = Math.floor(i / cols) % rows;
      const layer = Math.floor(i / perLayer);
      const x = (col - (cols - 1) / 2) * colGap;
      const y = ((rows - 1) / 2 - row) * rowGap;
      const z = offsetZ + ((layer - (layers - 1) / 2) * depthGap);
      $el.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
    });
  },
  random: () => {
    // The table view use CSS grid and has no special tranforms except for a selected element
    pointer.rotateX = 15;
    pointer.rotateY = 20;
    utils.set(cards, { x: () => utils.random(-500, 500), y: () => utils.random(-500, 500), z: () => utils.random(-500, 500)})
  },
};

document.addEventListener('pointermove', event => {
  const hw = window.innerWidth * .5;
  const hh = window.innerHeight * .5;
  pointer.x = utils.mapRange(event.clientX - hw, -hw, hw, 1, -1);
  pointer.y = utils.mapRange(event.clientY - hh, -hh, hh, -1, 1);
});

const toggles = utils.$('.controls button.toggle');

document.addEventListener('click', event => {
  const $toggle = event.target.closest('.controls button.toggle');
  if ($toggle) {
    toggles.forEach(button => button.classList.remove('is-active'));
    $toggle.classList.add('is-active');
    const layoutType = $toggle.id;
    elementsLayout.update(() => {
      cards.forEach($el => $el.classList.remove('is-expanded'));
      $sceneContent.dataset.layout = layoutType;
      transformLayout[layoutType]();
    }, {
      delay: stagger([0, 750], { from: 'random' })
    });
    return;
  }
  const $card = event.target.closest('#scene-content .element');
  const shouldExpand = $card && !$card.classList.contains('is-expanded');
  elementsLayout.update(() => {
    cards.forEach($el => $el.classList.remove('is-expanded'));
    if (shouldExpand) $card.classList.add('is-expanded');
    transformLayout[$sceneContent.dataset.layout]();
  },{
    ease: spring({ bounce: .2, duration: 350 }),
  });
});

document.addEventListener('keydown', event => {
  if (event.key !== 'Escape') return;
  const hasExpandedCard = cards.some($el => $el.classList.contains('is-expanded'));
  if (!hasExpandedCard) return;
  elementsLayout.update(() => {
    cards.forEach($el => $el.classList.remove('is-expanded'));
    transformLayout[$sceneContent.dataset.layout]();
  },{
    ease: spring({ bounce: .3, duration: 350 }),
  });
});

// Intro animation

transformLayout.random();
utils.set(cards, { opacity: 0 });
elementsLayout.update(() => transformLayout.table(), {
  delay: stagger([0, 750], { from: 'random' })
});
</script>
